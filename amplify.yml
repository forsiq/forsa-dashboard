version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - node -v
        - npm -v
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - rm -rf .next/cache
        - NODE_OPTIONS='--max-old-space-size=4096' npm run build 2>&1
        - echo "BUILD SUCCESS"
        - ls -la .next/
        - ls -la .next/server/ 2>/dev/null || echo "No .next/server/"
        - ls -la .next/static/ 2>/dev/null || echo "No .next/static/"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
