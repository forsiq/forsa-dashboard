version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm -v
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - rm -rf .next/cache
        - NODE_OPTIONS='--max-old-space-size=4096' npm run build 2>&1
        - echo "BUILD SUCCESS - checking output..."
        - ls -la .next/ | head -20
        - ls .next/server/pages/ 2>/dev/null | head -20 || echo "No server/pages dir"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
