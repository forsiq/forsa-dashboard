version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm ls-remote --lts 2>/dev/null | tail -1
        - nvm install 22 || echo "nvm install 22 failed, using default"
        - nvm use 22 || echo "nvm use 22 failed, using default"
        - node -v
        - npm -v
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - rm -rf .next/cache
        - node -v
        - NODE_OPTIONS='--max-old-space-size=4096' npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
