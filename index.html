<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZoneVast | Enterprise PIM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Tajwal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Tajwal', 'system-ui', 'sans-serif'],
            },
            fontSize: {
              'xxs': '0.65rem',
              'xs': '0.75rem',
              'sm': '0.8125rem',
            },
            transitionDuration: {
              'xs': '100ms',
              's': '200ms',
              'm': '300ms',
            },
            colors: {
              brand: {
                DEFAULT: '#FFC000', // Amber Gold
                glow: 'rgba(255, 192, 0, 0.15)',
              },
              obsidian: {
                outer: 'var(--color-obsidian-outer)',
                panel: 'var(--color-obsidian-panel)',
                card: 'var(--color-obsidian-card)',
                hover: 'var(--color-obsidian-hover)',
              },
              zinc: {
                text: 'var(--color-zinc-text)',
                secondary: 'var(--color-zinc-secondary)',
                muted: 'var(--color-zinc-muted)',
              },
              border: 'var(--color-border)',
              success: '#10B981', // Emerald 500
              warning: '#F59E0B', // Amber 500
              danger: '#EF4444',  // Red 500
              info: '#3B82F6',    // Blue 500
            }
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@7.1.5?external=react,react-dom",
        "lucide-react": "https://esm.sh/lucide-react@0.475.0?external=react,react-dom",
        "recharts": "https://esm.sh/recharts@2.15.1?external=react,react-dom",
        "clsx": "https://esm.sh/clsx@2.1.1",
        "tailwind-merge": "https://esm.sh/tailwind-merge@2.5.2",
        "@google/genai": "https://esm.sh/@google/genai@1.3.0",
        "react/": "https://esm.sh/react@19.0.0/",
        "react-dom/": "https://esm.sh/react-dom@19.0.0/"
      }
    }
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="main.tsx"></script>
  </body>
</html>
