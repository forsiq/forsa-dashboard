- version: "1.5.2"
  date: "2026-05-20"
  title:
    en: "Auth stability, RBAC, and dashboard polish"
    ar: "استقرار المصادقة، صلاحيات الأدوار، وتحسينات اللوحة"
  entries:
    - description:
        en: "Fixed unexpected logout on page refresh while project config was still loading (ProjectGuard + core-ui project cache)."
        ar: "إصلاح تسجيل الخروج غير المتوقع عند تحديث الصفحة أثناء تحميل إعدادات المشروع (ProjectGuard + تخزين المشروع في core-ui)."
      type: fixed

    - description:
        en: "Login page no longer blocks clicks after redirect or logout; stuck modal overlays are cleared on auth navigation."
        ar: "صفحة تسجيل الدخول لم تعد تمنع النقر بعد إعادة التوجيه أو تسجيل الخروج؛ تُزال طبقات الـ overlay العالقة عند الانتقال لصفحات المصادقة."
      type: fixed

    - description:
        en: "Session expired dialog shows on protected routes only; login stores JWT-aware cookie expiry via core-ui 0.5.17."
        ar: "حوار انتهاء الجلسة يظهر في المسارات المحمية فقط؛ تسجيل الدخول يستخدم مدة cookies مرتبطة بـ JWT عبر core-ui 0.5.17."
      type: fixed

    - description:
        en: "Resolved hydration mismatch in language and theme providers after page load."
        ar: "إصلاح عدم تطابق hydration في مزودي اللغة والثيم بعد تحميل الصفحة."
      type: fixed

    - description:
        en: "Streamlined login to username and password; forgot-password and OTP flows consolidated with clearer API error handling."
        ar: "تبسيط تسجيل الدخول باسم المستخدم وكلمة المرور؛ توحيد استعادة كلمة المرور وOTP مع معالجة أوضح لأخطاء الـ API."
      type: improved
      sidebarPath: /login

    - description:
        en: "Role-based access control in sidebar menu and proxy: routes and nav items respect JWT roles."
        ar: "صلاحيات حسب الدور في القائمة الجانبية والـ proxy: المسارات وعناصر التنقل تتبع أدوار JWT."
      type: added

    - description:
        en: "Proxy auth refactor: legacy middleware removed; JWT validation and public paths (including /.well-known) handled in one place."
        ar: "إعادة هيكلة مصادقة الـ proxy: إزالة middleware القديم؛ التحقق من JWT والمسارات العامة (بما فيها /.well-known) في مكان واحد."
      type: changed

    - description:
        en: "Sidebar badges now load auction, order, and listing counts from the API instead of static placeholders."
        ar: "شارات الشريط الجانبي تعرض الآن أعداد المزادات والطلبات والمنتجات من الـ API بدل القيم الثابتة."
      type: improved

    - description:
        en: "Auction details: dedicated countdown display; auction list uses optimized countdown cells and deferred dashboard stats."
        ar: "تفاصيل المزاد: عرض عدّاد تنازلي مخصص؛ قائمة المزادات بعدّادات محسّنة وإحصائيات لوحة تُحمّل عند الحاجة."
      type: improved
      sidebarPath: /auctions

    - description:
        en: "Sorting added on My Bids, Watchlist, Group Buying, Users, and Settlement Desk; list pages use consistent loading skeletons."
        ar: "إضافة ترتيب في عروضي والمفضلة والشراء الجماعي والمستخدمين ومكتب التسويات؛ صفحات القوائم تستخدم هياكل تحميل موحّدة."
      type: improved

    - description:
        en: "Settings page with General, Auction, Navigation, Notifications, Payments, and Shipping tabs; preferences persist in local storage."
        ar: "صفحة إعدادات بأقسام عام، مزاد، تنقل، إشعارات، مدفوعات، وشحن؛ تُحفظ التفضيلات في التخزين المحلي."
      type: added
      sidebarPath: /settings

    - description:
        en: "Arabic and English translations for dashboard, live monitor, settlement desk, and moderation hub."
        ar: "ترجمات عربية وإنجليزية للوحة التحكم والمراقبة الحية ومكتب التسويات ومركز الإشراف."
      type: improved

    - description:
        en: "Listings statistics and import paths refined for more accurate counts on the listings page."
        ar: "تحسين إحصائيات المنتجات ومسارات الاستيراد لعرض أعداد أدق في صفحة المنتجات."
      type: improved
      sidebarPath: /listings

- version: "1.5.1"
  date: "2026-05-17"
  title:
    en: "Unified list page layout"
    ar: "توحيد تخطيط صفحات القوائم"
  entries:
    - description:
        en: "Main list pages share a consistent header, stats row, search toolbar, and filter slide-over (listings, auctions, group buying, users, settlements, moderation, watchlist, my bids)."
        ar: "صفحات القوائم الرئيسية تستخدم الآن نفس نمط الهيدر وصف الإحصائيات وشريط البحث والفلتر (المنتجات، المزادات، الشراء الجماعي، المستخدمين، التسويات، الإشراف، المفضلة، عروضي)."
      type: improved

- version: "1.5.0"
  date: "2026-05-16"
  title:
    en: "Wizard + Form dual mode and simplified lifecycle"
    ar: "مساران للمنتج وتبسيط إدارة المزاد"
  entries:
    - description:
        en: "Two product creation modes: 5-step wizard (default) and quick form — switch via URL or CTA"
        ar: "مساران لإنشاء المنتج: معالج 5 خطوات (افتراضي) ونموذج سريع — التبديل عبر الرابط أو الزر"
      type: added
      sidebarPath: /listings

    - description:
        en: "Product images now resolve from attachment IDs when no direct URL is available"
        ar: "صور المنتجات تظهر الآن من معرّفات المرفقات عند عدم توفر رابط مباشر"
      type: fixed
      sidebarPath: /listings

    - description:
        en: "Auction and group buy lifecycle simplified to cancel-only in the UI — end, pause, extend, and reschedule hidden for later dashboard control"
        ar: "إدارة دورة حياة المزاد والصفقة مبسّطة إلى إلغاء فقط — إنهاء، إيقاف، تمديد، وجدولة مخفية للتحكم لاحقاً من لوحة الإعدادات"
      type: changed
      sidebarPath: /auctions

- version: "1.4.2"
  date: "2026-05-16"
  title:
    en: "Auto-activate on publish"
    ar: "تفعيل تلقائي عند النشر"
  entries:
    - description:
        en: "Product wizard grouped into 5 steps: product, details, photos, channel, then pricing and publish"
        ar: "معالج المنتج مجمّع في 5 خطوات: المنتج، التفاصيل، الصور، القناة، ثم التسعير والنشر"
      type: improved
      sidebarPath: /listings

    - description:
        en: "Deploy from a product creates an active auction or group deal immediately — no schedule step and no manual start"
        ar: "النشر من المنتج ينشئ مزاداً أو صفقة نشطة فوراً — بدون خطوة جدولة وبدون تفعيل يدوي"
      type: fixed
      sidebarPath: /listings

- version: "1.4.1"
  date: "2026-05-16"
  title:
    en: "Product-first publish wizard"
    ar: "معالج نشر يبدأ من المنتج"
  entries:
    - description:
        en: "New 8-step product wizard: basic info, description, specs, references, photos, then auction or group buy pricing and publish"
        ar: "معالج منتج من 8 خطوات: أساسي، وصف، مواصفات، مراجع، صور، ثم تسعير ونشر كمزاد أو صفقة جماعية"
      type: added
      sidebarPath: /listings

    - description:
        en: "Removed schedule, publish-now, and draft toggles from listing deploy — publish uses a 7-day window automatically"
        ar: "إزالة خيارات الجدولة والنشر الفوري والمسودة من نشر القائمة — النشر يستخدم نافذة 7 أيام تلقائياً"
      type: changed
      sidebarPath: /listings

    - description:
        en: "Create auction and group buy now start from Products; standalone add pages redirect to the wizard"
        ar: "إنشاء المزاد والصفقة يبدأ من المنتجات؛ صفحات الإضافة المنفصلة توجّه إلى المعالج"
      type: changed
      sidebarPath: /listings

- version: "1.4.0"
  date: "2026-05-16"
  title:
    en: "Faster Navigation & Smoother Loading"
    ar: "تنقل أسرع وتحميل أكثر سلاسة"
  entries:
    - description:
        en: "Fixed create auction showing Internal Server Error when reserve price was below start price — now shows a clear validation message"
        ar: "تم إصلاح خطأ الخادم الداخلي عند إنشاء مزاد إذا كان سعر الاحتياط أقل من سعر البداية — تظهر رسالة تحقق واضحة الآن"
      type: fixed
      sidebarPath: /auctions

    - description:
        en: "Deploy auction form now uses optional original price instead of reserve price when publishing a listing"
        ar: "نموذج نشر المزاد يستخدم السعر الأصلي الاختياري بدلاً من سعر الاحتياط عند نشر القائمة"
      type: changed
      sidebarPath: /listings

    - description:
        en: "Deploy listing form validates prices and schedule on the client with Arabic and English field errors before calling the API"
        ar: "نموذج نشر القائمة يتحقق من الأسعار والجدولة على المتصفح مع رسائل عربية وإنجليزية قبل إرسال الطلب"
      type: improved
      sidebarPath: /listings

    - description:
        en: "Fixed product and listing forms only saving the first image when multiple photos were selected"
        ar: "تم إصلاح نماذج القوائم والمزادات التي كانت تحفظ الصورة الأولى فقط عند اختيار عدة صور"
      type: fixed
      sidebarPath: /listings

    - description:
        en: "Added route progress bar for instant visual feedback when navigating between pages"
        ar: "تمت إضافة شريط تقدم للتنقل يعطي رد فعل بصري فوري عند الانتقال بين الصفحات"
      type: improved
      sidebarPath: /auctions

    - description:
        en: "Eliminated blank flashes when filtering lists — previous data stays visible until new data arrives"
        ar: "تم إزالة الوميض الفارغ عند تصفية القوائم — البيانات السابقة تبقى مرئية حتى وصول الجديدة"
      type: improved

    - description:
        en: "Warmed cache on sidebar hover for faster first paint on common pages"
        ar: "تم تسخين الذاكرة المؤقتة عند تحويم الشريط الجانبي لتحميل أسرع للصفحات الشائعة"
      type: improved

